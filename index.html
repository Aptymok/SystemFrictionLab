<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>System Friction Lab | Home</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        body.lab-mode { background: #ffffff; color: #0044ff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .electro-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 300px; }
        /* El Pulso Azul Vivo */
        .heartbit { width: 100%; height: 2px; background: #0044ff; position: absolute; top: 50%; box-shadow: 0 0 20px #0044ff; animation: bit 1.5s infinite; }
        @keyframes bit {
            0% { opacity: 0.2; transform: scaleY(1); }
            50% { opacity: 1; transform: scaleY(3); }
            100% { opacity: 0.2; transform: scaleY(1); }
        }
        .ui-overlay { position: relative; z-index: 10; padding: 50px; text-align: center; }
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 900px; margin: 100px auto; }
        .btn-lab { border: 1px solid #0044ff; padding: 20px; text-decoration: none; color: #0044ff; transition: 0.3s; }
        .btn-lab:hover { background: #0044ff; color: #fff; }
        .btn-sombra { background: #000; color: #ffbf00; border: 1px solid #ffbf00; padding: 20px; text-decoration: none; }
    </style>
</head>
<body class="lab-mode">
    <div class="electro-container">
        <div class="heartbit"></div>
    </div>
    <div class="ui-overlay">
        <h1 style="letter-spacing: 5px;">SYSTEM FRICTION LAB</h1>
        <div class="nav-grid">
            <a href="labs.html" class="btn-lab">ENTRAR AL LABORATORIO</a>
            <a href="research.html" class="btn-lab">INVESTIGACIÓN (MIHM)</a>
            <a href="core/nodo_aptymok.md" class="btn-sombra">MODO SOMBRA</a>
        </div>
    </div>
</body>
</html>
