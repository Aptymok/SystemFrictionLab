<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Friction · Scorecard v.Beta</title>

  <style>
    /* ======================================================
       SYSTEM FRICTION MAIN.CSS v1.2 (Inversión Luz + ECG)
       ====================================================== */
    :root {
      /* Surface - INVERSIÓN LUZ */
      --bg:       #ffffff;
      --surface:  #f8f9ff;
      --surface2: #f0f3ff;
      --border:   #e0e4f5;
      --border2:  #c0c8e0;

      /* Text */
      --text:     #1a1b1e;
      --text-dim: #5c6275;
      --text-faint:#a0a8c0;

      /* Accent - AZUL ELÉCTRICO (OPUESTO AL ORO) */
      --accent:   #0044ff;
      --accent-dim: rgba(0, 68, 255, 0.1);
      --gold:     #c9a84c; /* Se mantiene para Sombra */

      /* Status */
      --ok:       #2e7d32;
      --warn:     #fbc02d;
      --crit:     #c62828;
      
      --mono:  'JetBrains Mono', monospace;
      --gap: 1.2rem; --r: 2px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, serif;
      margin: 0;
      overflow-x: hidden;
    }

    /* ======================================================
       EL ECG (ELECTRODINAMISMO) - CAPA DE FONDO
       ====================================================== */
    .ecg-layer {
      position: fixed;
      top: 50%;
      left: 0;
      width: 100%;
      height: 120px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.15; /* Sutil, no interfiere con el texto */
    }

    .ecg-svg {
      width: 100%;
      height: 100%;
      stroke: var(--accent);
      stroke-width: 2;
      fill: none;
    }

    .ecg-path {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: dash 4s linear infinite;
    }

    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }

    /* ======================================================
       ESTRUCTURA DASHBOARD (Tu Grid Original)
       ====================================================== */
    .site-wrap { position: relative; z-index: 10; } /* Encima del ECG */

    .topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 44px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--gap); font-family: var(--mono); font-size: 0.65rem;
    }

    .hero {
      padding: 100px var(--gap) 60px;
      text-align: center;
    }

    .hero__formula {
      font-size: clamp(2rem, 8vw, 4rem);
      font-family: var(--mono);
      color: var(--accent);
      letter-spacing: -0.05em;
    }

    .gauge-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--gap);
      padding: var(--gap);
    }

    .gauge-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: var(--gap);
      display: flex; flex-direction: column; align-items: center;
      transition: transform 0.3s;
    }

    .gauge-card:hover { transform: translateY(-5px); border-color: var(--accent); }

    .gauge-card__value {
      font-family: var(--mono);
      font-size: 2.5rem;
      color: var(--accent);
    }

    .badge {
      font-family: var(--mono); font-size: 0.6rem;
      border: 1px solid var(--accent); padding: 2px 8px;
    }

    /* FOOTER SOMBRA */
    .site-footer {
      background: #080807; color: #7a7670;
      padding: 40px var(--gap); font-family: var(--mono);
    }
  </style>
</head>
<body>

  <div class="ecg-layer">
    <svg class="ecg-svg" viewBox="0 0 1000 100">
      <path class="ecg-path" d="M0,50 L200,50 L210,40 L220,60 L230,20 L240,80 L250,50 L400,50 L410,30 L425,70 L440,50 L600,50 L615,10 L630,90 L645,50 L1000,50" />
    </svg>
  </div>

  <div class="site-wrap">
    <div class="topbar">
      <div>⏣ SYSTEM FRICTION <span style="color:var(--accent)">· LAB</span></div>
      <div style="color: var(--crit)">● IHG -0.620</div>
    </div>

    <main class="hero">
      <div style="text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; color: var(--text-dim);">Postulado de partida</div>
      <div class="hero__formula">f = (t/T) + O</div>
      <div style="font-family: var(--mono); font-size: 0.7rem; margin-top: 1rem;">⚡ EVENTO CRÍTICO · FEB 2026</div>
    </main>

    <section class="gauge-grid">
      <div class="gauge-card">
        <div style="font-size: 0.6rem; color: var(--text-dim);">IHG GLOBAL</div>
        <div class="gauge-card__value">-0.620</div>
        <span class="badge">EMERGENCIA</span>
      </div>

      <div class="gauge-card">
        <div style="font-size: 0.6rem; color: var(--text-dim);">NTI SISTEMA</div>
        <div class="gauge-card__value">0.351</div>
        <span class="badge">INFRA-UCAP</span>
      </div>

      <div class="gauge-card">
        <div style="font-size: 0.6rem; color: var(--text-dim);">P(COLAPSO 2030)</div>
        <div class="gauge-card__value">71%</div>
        <span class="badge">ALTA PROB.</span>
      </div>

      <a href="core/nodo_aptymok.md" style="text-decoration:none;">
        <div class="gauge-card" style="background: #000; color: var(--gold); border-color: var(--gold);">
            <div style="font-size: 0.6rem;">NODO APTYMOK</div>
            <div class="gauge-card__value" style="color:var(--gold);">CORE</div>
            <span class="badge" style="border-color:var(--gold);">ENTRAR →</span>
        </div>
      </a>
    </section>

    <footer class="site-footer">
      <div style="display: flex; justify-content: space-between; font-size: 0.6rem;">
        <div>© 2026 JAML · aptymok@gmail.com</div>
        <div style="color: var(--accent);">MONTE CARLO 50K // SEED 42</div>
      </div>
    </footer>
  </div>

</body>
</html>
