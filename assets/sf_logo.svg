<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="turbulence" x="0%" y="0%" width="100%" height="100%">
            <feTurbulence baseFrequency="0.01" numOctaves="2" seed="1" result="turb"/>
            <feDisplacementMap in="SourceGraphic" in2="turb" scale="5" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <style>
            .logo-text {
                font-family: 'JetBrains Mono', monospace;
                font-size: 24px;
                font-weight: 500;
                fill: #c9a84c;
            }
        </style>
    </defs>
    <g id="logo-group">
        <text x="20" y="45" class="logo-text">S</text>
        <text x="45" y="45" class="logo-text">Y</text>
        <text x="70" y="45" class="logo-text">S</text>
        <text x="100" y="45" class="logo-text">F</text>
        <text x="125" y="45" class="logo-text">R</text>
        <text x="150" y="45" class="logo-text">I</text>
        <text x="170" y="45" class="logo-text">C</text>
    </g>
</svg>
